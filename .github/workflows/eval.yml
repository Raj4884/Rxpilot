name: RxPilot CI — Tests + Eval Gate

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  PYTHON_VERSION: "3.11"
  # Eval mode — no real DB or API keys in CI
  DATABASE_URL_SYNC: "postgresql://rxpilot:rxpilot_dev@localhost:5432/rxpilot"
  ANTHROPIC_API_KEY: ""   # Intentionally empty — tests use mocks
  LANGFUSE_PUBLIC_KEY: ""
  LANGFUSE_SECRET_KEY: ""
  LANGFUSE_HOST: ""

jobs:
  # ────────────────────────────────────────────
  # Job 1: Unit + Integration Tests
  # ────────────────────────────────────────────
  tests:
    name: Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest

    strategy:
      matrix:
        python-version: ["3.11"]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests with coverage
        run: |
          python -m pytest tests/ -v \
            --tb=short \
            --junit-xml=test-results.xml \
            -q
        env:
          PYTHONIOENCODING: utf-8

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: test-results.xml

  # ────────────────────────────────────────────
  # Job 2: Eval Gate — metric regression check
  # ────────────────────────────────────────────
  eval-gate:
    name: Eval Gate
    runs-on: ubuntu-latest
    needs: tests   # Only run if tests pass

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run evaluation suite
        run: |
          python -m eval.run_eval
        env:
          PYTHONIOENCODING: utf-8

      - name: Upload eval results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: eval-results
          path: |
            eval/baseline_scores.json

  # ────────────────────────────────────────────
  # Job 3: Lint + Type check
  # ────────────────────────────────────────────
  lint:
    name: Lint + Type Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install lint tools
        run: |
          pip install ruff pyright

      - name: Run Ruff linter
        run: |
          ruff check . --select=E,F,W,I \
            --ignore=E501 \
            --exclude=venv,.venv,__pycache__
        continue-on-error: true

      - name: Run Pyright type checker (informational)
        run: |
          pyright agents/ api/ voice/ rag/ eval/ \
            --pythonversion 3.11 \
            --outputjson 2>/dev/null | python -c "
          import json, sys
          data = json.load(sys.stdin)
          errors = data.get('generalDiagnostics', [])
          errors = [e for e in errors if e.get('severity') == 'error']
          print(f'Pyright: {len(errors)} error(s)')
          for e in errors[:10]:
              print(f\"  {e.get('file','?')}:{e.get('range',{}).get('start',{}).get('line','?')}: {e.get('message','?')}\")
          " || true
        continue-on-error: true
